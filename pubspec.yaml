name: lab9_flutter
description: "Кроссплатформенное адаптивное приложение (лаб 9, задание 4, вариант 8)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  # Управление состоянием
  flutter_riverpod: ^2.6.1
  # Навигация
  go_router: ^14.6.2
  # Локальное хранилище (сессия, кэш, данные) — офлайн-режим
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Сеть
  dio: ^5.7.0
  # Графики
  fl_chart: ^0.69.2
  # Интернационализация
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
